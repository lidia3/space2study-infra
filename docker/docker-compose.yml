services:
  mongo:
    image: mongo:7
    container_name: mongo
    restart: unless-stopped

    ports:
      - "27017:27017"

    volumes:
      - mongo_data:/data/db

  backend:
     build:
       context: /home/lidia/projects/space2study-backend-lidia3

     container_name: backend
     restart: unless-stopped

     ports:
       - "3000:3000"

     env_file:
       - /home/lidia/projects/space2study-backend-lidia3/.env.docker

     depends_on:
       - mongo

  frontend:
    build:
      context: /home/lidia/projects/space2study-frontend-lidia3

    container_name: frontend
    restart: unless-stopped

    ports:
      - "3001:3000"

    depends_on:
      - backend

volumes:
  mongo_data:

