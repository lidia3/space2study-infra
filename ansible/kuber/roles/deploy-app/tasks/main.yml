---
- name: Deploy app to k8s
  environment:
    KUBECONFIG: /home/ubuntu/.kube/config
  block:

    - name: Create Kubernetes manifests directory
      file:
        path: /opt/k8s
        state: directory
        mode: "0755"

    - name: Copy Kubernetes manifests
      copy:
        src: "{{ playbook_dir }}/../../../k8s/"
        dest: /opt/k8s/

    - name: Set node public IP from inventory
      set_fact:
        node_public_ip: "{{ ansible_host | default(inventory_hostname) }}"

    - name: Get frontend NodePort from service
      command: >
        kubectl get svc frontend -n space2study
        -o jsonpath='{.spec.ports[0].nodePort}'
      register: frontend_port_result
      changed_when: false

    - name: Set frontend NodePort fact
      set_fact:
        frontend_nodeport: "{{ frontend_port_result.stdout }}"

    - name: Render ConfigMap
      template:
        src: "{{ playbook_dir }}/../../../k8s/configmap.yaml.j2"
        dest: /opt/k8s/configmap.yaml

    - name: Render Secret
      template:
        src: "{{ playbook_dir }}/../../../k8s/secret.yaml.j2"
        dest: /opt/k8s/secret.yaml

    - name: Deploy Namespace
      command: kubectl apply -f /opt/k8s/namespace.yaml

    - name: Deploy ConfigMap
      command: kubectl apply -f /opt/k8s/configmap.yaml

    - name: Deploy Secret
      command: kubectl apply -f /opt/k8s/secret.yaml

    - name: Deploy MongoDB
      command: kubectl apply -f /opt/k8s/mongodb/

    - name: Deploy Backend
      command: kubectl apply -f /opt/k8s/backend/

    - name: Deploy Frontend
      command: kubectl apply -f /opt/k8s/frontend/

