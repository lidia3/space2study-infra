apiVersion: apps/v1
kind: Deployment

metadata:
  name: backend
  namespace: space2study

spec:
  replicas: 1

  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend

    spec:
      containers:

      - name: backend

        image: mydockerlidia/space2study-backend:latest

        imagePullPolicy: Always

        ports:
        - containerPort: 3000

        envFrom:
        - configMapRef:
            name: backend-config

        resources:
          requests:
            cpu: "250m"
            memory: "256Mi"

          limits:
            cpu: "500m"
            memory: "512Mi"
